<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <script>
    (function () {
      var t = null; try { t = localStorage.getItem('theme'); } catch (e) {}
      if (t !== 'light' && t !== 'dark') {
        t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      }
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <title>404 - Youssef Elshemi</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
  <link rel="stylesheet" href="css/styles.css" onerror="this.onerror=null;this.href='/css/styles.css'">
  <link rel="stylesheet" href="css/404.css">
</head>
<body>

  <canvas id="particle-canvas"></canvas>
  <div class="cursor-dot" id="cursor-dot"></div>
  <div class="cursor-ring" id="cursor-ring"></div>

  <nav>
    <a href="/" class="nav-logo">Youssef Elshemi</a>
  </nav>

  <main class="error-wrap">
    <p class="section-label">// page not found</p>
    <h1 class="error-code">404</h1>
    <p class="error-text">This route doesn't resolve. The page you're looking for doesn't exist or has moved.</p>
    <div class="game-wrap">
      <div class="game-canvas-wrap">
        <canvas id="snake-canvas" width="280" height="280"></canvas>
        <div id="snake-overlay" class="snake-overlay">
          <span id="snake-over-score" class="snake-over-score" style="display:none"></span>
          <button id="snake-action-btn" class="snake-action-btn" onclick="window.__snakeAction&&window.__snakeAction()">&#x25B6; start</button>
        </div>
      </div>
      <div class="snake-dpad">
        <button class="dpad-btn" id="dpad-up">↑</button>
        <button class="dpad-btn" id="dpad-left">←</button>
        <button class="dpad-btn" id="dpad-right">→</button>
        <button class="dpad-btn" id="dpad-down">↓</button>
      </div>
      <p class="game-hint">d-pad &nbsp;·&nbsp; swipe &nbsp;·&nbsp; arrow keys</p>
    </div>
    <a href="/" class="btn">Back to Home</a>
  </main>

  <footer>
    <span>© 2026 Youssef Elshemi</span>
  </footer>

  <script src="scripts/cursor.js"></script>
  <script src="scripts/particles.js"></script>
  <script src="scripts/404.js"></script>

</body>
</html>
