<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <script>
    (function () {
      var t = null; try { t = localStorage.getItem('theme'); } catch (e) {}
      if (t !== 'light' && t !== 'dark') {
        t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      }
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <title>404 - Youssef Elshemi</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
  <link rel="stylesheet" href="css/styles.css" onerror="this.onerror=null;this.href='/css/styles.css'">
  <style>
    body { cursor: auto; }
    .error-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 6rem 2rem 2rem;
    }
    .error-code {
      font-family: var(--font-mono);
      font-size: clamp(5rem, 18vw, 9rem);
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 1.5rem;
      animation: glitch 2.5s steps(1, end) infinite;
    }
    .error-text {
      color: var(--text-muted);
      margin-bottom: 2.5rem;
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">Youssef Elshemi</a>
  </nav>

  <main class="error-wrap">
    <p class="section-label">// page not found</p>
    <h1 class="error-code">404</h1>
    <p class="error-text">This route doesn't resolve. The page you're looking for doesn't exist or has moved.</p>
    <a href="/" class="btn">Back to Home</a>
  </main>

  <footer>
    <span>© 2026 Youssef Elshemi</span>
  </footer>

</body>
</html>
